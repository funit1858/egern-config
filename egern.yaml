ipv6: true
vif_only: true
hide_vpn_icon: false
hijack_dns:
- '*:53'
geoip_db_url: https://cdn.jsdelivr.net/gh/Masaiki/GeoIP2-CN@release/Country.mmdb
asn_db_url: https://cdn.jsdelivr.net/gh/P3TERX/GeoLite.mmdb@download/GeoLite2-ASN.mmdb
direct_latency_test_url: http://wifi.vivo.com.cn/generate_204
compat_route: false
dns:
  bootstrap:
  - 223.5.5.5
  - 119.29.29.29
  - 1.12.12.12
  - 120.53.53.53
  - 2400:3200::1
  upstreams:
    AdBlack:
    - quic://dns.adguard-dns.com
    - https://dns.adguard-dns.com/dns-query
    Alibaba:
    - 223.5.5.5
    - https://dns.alidns.com/dns-query
    Tencent:
    - 119.29.29.29
    - https://doh.pub/dns-query
    ByteDance:
    - 180.184.2.2
    - 180.184.1.1
    China:
    - 223.5.5.5
    - 119.29.29.29
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    Global:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  forward:
  - proxy_rule_set:
      match: https://cdn.jsdelivr.net/gh/Loyalsoldier/surge-rules@release/ruleset/reject.txt
      value: AdBlack
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/Alibaba.lsr
      value: Alibaba
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/Tencent.lsr
      value: Tencent
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/DouYin.lsr
      value: ByteDance
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/Apple.lsr
      value: China
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/ChinaMax.lsr
      value: China
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/Global.lsr
      value: Global
  - domain_wildcard:
      match: '*'
      value: Global
  proxy_nameservers:
  - https://1.1.1.1/dns-query
  - https://dns.google/dns-query
  public_ip_lookup_url: https://ifconfig.me/ip
policy_groups:
- external:
    name: AllServer
    type: select
    urls:
  - https://your-subscription-url
    filter: '^((?!Remain|Expired|瀹樼綉|濡傞渶|濂楅|鍘婚櫎|鍓╀綑|璺濈|Reset|閲嶇疆|娴侀噺).)+$'
    update_interval: 86400
    icon: https://cdn.jsdelivr.net/gh/lige47/QuanX-icon-rule@main/icon/05icon/rocket(1).png
    hidden: false
- select:
    name: Hong Kong
    policies:
    - AllServer
    flatten: true
    filter: '馃嚟馃嚢|HK|棣欐腐|Hong\s*Kong|HongKong|HKG|MO'
    update_interval: 86400
    icon: https://cdn.jsdelivr.net/gh/lige47/QuanX-icon-rule@main/icon/01Country/Hongkong(3).png
    hidden: false
- select:
    name: Taiwan
    policies:
    - AllServer
    flatten: true
    filter: '馃嚬馃嚰|TW|鍙版咕|Taiwan|Tai|TWN'
    update_interval: 86400
    icon: https://cdn.jsdelivr.net/gh/lige47/QuanX-icon-rule@main/icon/01Country/taiwan(4).png
    hidden: false
- select:
    name: Japan
    policies:
    - AllServer
    flatten: true
    filter: '馃嚡馃嚨|JP|鏃ユ湰|Japan|JPN'
    update_interval: 86400
    icon: https://cdn.jsdelivr.net/gh/lige47/QuanX-icon-rule@main/icon/01Country/Japan(2).png
    hidden: false
- select:
    name: Singapore
    policies:
    - AllServer
    flatten: true
    filter: '馃嚫馃嚞|SG|鏂板姞鍧鐙煄|Singapore|SGP|MA'
    update_interval: 86400
    icon: https://cdn.jsdelivr.net/gh/lige47/QuanX-icon-rule@main/icon/01Country/singapore.png
